<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Every player holds the same thirteen cards — spend them to win the prizes, and never spend more than you had to." />
    <meta property="og:title" content="Bidstorm" />
    <meta property="og:description" content="Every player holds the same thirteen cards — spend them to win the prizes, and never spend more than you had to." />
    <meta property="og:type" content="website" />
    <!-- Every asset href here is RELATIVE. The game is served from a project
         subpath in dev and from its own domain in production; a leading slash
         resolves to the wrong place in one of the two, and a manifest whose
         icons 404 fails to install with no visible error anywhere. -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0d1117" />
    <!-- iOS IGNORES the manifest's icons. This 180x180 is the ONLY icon it will
         use, and it must be opaque — iOS composites transparency onto black. -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bidstorm" />
    <title>Bidstorm</title>
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "ba2bab2193ba42c1bea3d6714fcd0e28"}'></script>
    <!-- seo:begin (managed by scripts/seo/backfill.mjs) -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta property="og:url" content="https://bidstorm.benrichardson.dev/" />
    <meta property="og:image" content="https://bidstorm.benrichardson.dev/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bidstorm" />
    <meta name="twitter:description" content="Everyone holds the same thirteen cards — outbid your rivals for each prize, and never spend more than you had to." />
    <meta name="twitter:image" content="https://bidstorm.benrichardson.dev/og.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "name": "Bidstorm",
        "description": "Everyone holds the same thirteen cards — outbid your rivals for each prize, and never spend more than you had to.",
        "url": "https://bidstorm.benrichardson.dev/",
        "image": "https://bidstorm.benrichardson.dev/og.png",
        "@type": "VideoGame",
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "author": {
          "@type": "Person",
          "name": "Ben Richardson",
          "url": "https://benrichardson.dev"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <!-- seo:end -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
